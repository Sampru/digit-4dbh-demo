<!doctype html>
<html lang="es">
<head>
  {% load static %}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Estafagram</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap");

    :root {
      --bg: #000000;
      --panel: #152127;
      --text: #ffffff;
      --muted: #c7d2e0;
      --line: #1f2a37;
      --blue: #1f6fff;
      --blue-dark: #1459d6;
      --focus: rgba(31, 111, 255, 0.25);
      --ok-bg: #ecfdf3;
      --ok-line: #b8f1cb;
      --ok-text: #0f7a35;
      --divider: #5b6573;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Plus Jakarta Sans", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: 0;
    }

    .layout {
      width: 100%;
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 0;
      align-items: stretch;
    }

    .left {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .brand {
      width: min(460px, 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .brand-logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .brand-title {
      margin: 0;
      font-family: "Brush Script MT", "Snell Roundhand", "Segoe Script", cursive;
      font-size: clamp(2rem, 2.2vw + 1.3rem, 2.9rem);
      line-height: 0.95;
      color: var(--text);
      letter-spacing: 0.01em;
      font-weight: 500;
    }

    .hero-text {
      margin: 0;
      width: min(460px, 100%);
      text-align: center;
      font-size: clamp(1.45rem, 1.15vw + 1.1rem, 2rem);
      line-height: 1.2;
      letter-spacing: -0.015em;
      color: var(--text);
    }

    .hero-highlight {
      background: linear-gradient(to right, #ff5c00, #ff0069, #d300c5);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .hero-image {
      margin-top: 24px;
      width: min(520px, 100%);
      border-radius: 36px;
      display: block;
      filter: drop-shadow(0 28px 38px rgba(15, 23, 42, 0.2));
    }

    .right {
      background: var(--panel);
      border-left: 2px solid var(--divider);
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .right-inner {
      width: min(420px, 100%);
      margin: 0 auto;
      padding: 0px;
    }

    .form-title {
      margin: 0 0 16px;
      font-size: 1.3rem;
      letter-spacing: -0.02em;
    }

    label {
      display: block;
      margin-top: 10px;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.01em;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 15px;
      font-size: 0.98rem;
      background: #0b0f14;
      color: #ffffff;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input::placeholder {
      color: #8fa0b7;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px var(--focus);
    }

    button {
      width: 100%;
      margin-top: 16px;
      border: 0;
      border-radius: 999px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.15s ease;
    }

    button:hover {
      background: var(--blue-dark);
      transform: translateY(-1px);
    }

    .forgot-link {
      display: block;
      margin-top: 14px;
      text-align: center;
      color: #d7e6ff;
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .forgot-link:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    .notice {
      margin-top: 14px;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid var(--ok-line);
      background: var(--ok-bg);
      color: var(--ok-text);
      font-weight: 700;
      font-size: 0.93rem;
      text-align: center;
    }

    @media (max-width: 980px) {
      .layout {
        min-height: auto;
        grid-template-columns: 1fr;
        gap: 0;
      }

      .left {
        align-items: flex-start;
      }

      .brand {
        justify-content: flex-start;
      }

      .hero-text {
        text-align: left;
      }

      .hero-image {
        width: min(420px, 100%);
      }

      .right {
        border-left: 0;
        border-top: 2px solid var(--divider);
        padding: 0;
      }

      .right-inner {
        width: min(560px, 100%);
        padding: 24px 20px;
      }
    }

    @media (max-width: 520px) {
      .right-inner {
        padding: 20px 16px;
      }
    }
  </style>
</head>
<body>
  <main class="layout">
    <section class="left">
      <div class="brand">
        <img class="brand-logo" src="{% static 'demo/logo.png' %}" alt="Logo de Estafagram">
        <p class="brand-title">Estafagram</p>
      </div>

      <p class="hero-text">Mira los momentos cotidianos de tus <span class="hero-highlight">mejores amigos</span>.</p>
      <img class="hero-image" src="{% static 'demo/image.png' %}" alt="Vista previa de Estafagram">
    </section>

    <section class="right">
      <div class="right-inner">
        <h1 class="form-title">Iniciar sesión en Estafagram:</h1>

        <form method="post">
          {% csrf_token %}
          <input id="email" name="email" type="text" placeholder="Número de movil, nombre de usuario o correo electrónico" required>
          <input id="password" name="password" type="password" placeholder="Contraseña" required>
          <button type="submit">Iniciar sesión</button>
          <a class="forgot-link" href="#">¿Has olvidado la contraseña?</a>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
